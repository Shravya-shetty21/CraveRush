# Server Port
server.port=${PORT:8080}

# Database Configuration (Using craverush database)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/craverush?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Spring MVC JSP View Resolver Configuration
spring.mvc.view.prefix=/jsp/
spring.mvc.view.suffix=.jsp
