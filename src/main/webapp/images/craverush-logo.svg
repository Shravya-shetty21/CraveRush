<svg width="700" height="150" viewBox="0 0 700 150" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- 3D Drop Shadow for Icon -->
        <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="3" dy="6" stdDeviation="5" flood-color="#FC8019" flood-opacity="0.4"/>
        </filter>
        
        <!-- Subtle Text Shadow -->
        <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.15"/>
        </filter>

        <!-- Icon Gradient -->
        <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FF9B44" />
            <stop offset="100%" stop-color="#E06D00" />
        </linearGradient>

        <!-- Accent Gradient -->
        <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFB373" />
            <stop offset="100%" stop-color="#FC8019" />
        </linearGradient>
    </defs>

    <g transform="translate(10, 25)">
        <!-- The Icon (Delivery Scooter Concept) -->
        <g transform="translate(0, 5)" filter="url(#iconShadow)">
            <!-- Speed lines behind -->
            <path d="M 0 50 L 25 50" stroke="url(#accentGradient)" stroke-width="6" stroke-linecap="round" stroke-dasharray="8 6"/>
            <path d="M 10 70 L 35 70" stroke="url(#accentGradient)" stroke-width="6" stroke-linecap="round" stroke-dasharray="10 8"/>
            <path d="M 5 30 L 20 30" stroke="url(#accentGradient)" stroke-width="6" stroke-linecap="round"/>
            
            <!-- Delivery Box / Bag -->
            <rect x="40" y="30" width="45" height="40" rx="8" fill="url(#iconGradient)"/>
            <path d="M 40 45 L 85 45" stroke="#FFFFFF" stroke-width="3" stroke-opacity="0.5"/>
            <path d="M 62.5 30 L 62.5 45" stroke="#FFFFFF" stroke-width="3" stroke-opacity="0.5"/>

            <!-- Scooter Body -->
            <path d="M 35 70 L 95 70 L 115 50 L 125 50 C 130 50 135 55 135 60 L 135 85 L 35 85 Z" fill="#1B1F2E"/>
            
            <!-- Handle & Light -->
            <path d="M 115 50 L 110 30 L 120 25" stroke="#1B1F2E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <circle cx="125" cy="55" r="4" fill="#FFFFFF"/>

            <!-- Wheels -->
            <circle cx="55" cy="85" r="12" fill="#1B1F2E"/>
            <circle cx="55" cy="85" r="5" fill="#FFFFFF"/>
            
            <circle cx="115" cy="85" r="12" fill="#1B1F2E"/>
            <circle cx="115" cy="85" r="5" fill="#FFFFFF"/>
        </g>
        
        <!-- The Text -->
        <g transform="translate(170, 75)" filter="url(#textShadow)">
            <!-- Spaced clearly, no overlap -->
            <text x="0" y="0" font-family="'Outfit', 'Inter', sans-serif" font-weight="900" font-size="75" letter-spacing="1.5" fill="#1B1F2E">Crave</text>
            <text x="250" y="0" font-family="'Outfit', 'Inter', sans-serif" font-weight="900" font-size="75" letter-spacing="1.5" fill="url(#iconGradient)">Rush</text>
        </g>
    </g>
</svg>
