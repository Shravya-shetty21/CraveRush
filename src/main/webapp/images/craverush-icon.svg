<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- 3D Drop Shadow for Icon -->
        <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="4" dy="8" stdDeviation="6" flood-color="#FC8019" flood-opacity="0.4"/>
        </filter>
        
        <!-- Icon Gradient -->
        <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FF9B44" />
            <stop offset="100%" stop-color="#E06D00" />
        </linearGradient>

        <!-- Accent Gradient -->
        <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFB373" />
            <stop offset="100%" stop-color="#FC8019" />
        </linearGradient>
    </defs>

    <!-- Background Circle -->
    <circle cx="100" cy="100" r="100" fill="#FFF4EB"/>
    
    <g transform="translate(30, 60)" filter="url(#iconShadow)">
        <!-- Speed lines behind -->
        <path d="M -10 50 L 25 50" stroke="url(#accentGradient)" stroke-width="8" stroke-linecap="round" stroke-dasharray="10 8"/>
        <path d="M 0 70 L 35 70" stroke="url(#accentGradient)" stroke-width="8" stroke-linecap="round" stroke-dasharray="12 10"/>
        <path d="M -5 30 L 15 30" stroke="url(#accentGradient)" stroke-width="8" stroke-linecap="round"/>
        
        <!-- Delivery Box / Bag -->
        <rect x="40" y="30" width="50" height="45" rx="8" fill="url(#iconGradient)"/>
        <path d="M 40 48 L 90 48" stroke="#FFFFFF" stroke-width="4" stroke-opacity="0.5"/>
        <path d="M 65 30 L 65 48" stroke="#FFFFFF" stroke-width="4" stroke-opacity="0.5"/>

        <!-- Scooter Body -->
        <path d="M 30 75 L 100 75 L 125 50 L 135 50 C 145 50 150 55 150 65 L 150 95 L 30 95 Z" fill="#1B1F2E"/>
        
        <!-- Handle & Light -->
        <path d="M 125 50 L 120 25 L 135 20" stroke="#1B1F2E" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="138" cy="58" r="6" fill="#FFFFFF"/>

        <!-- Wheels -->
        <circle cx="55" cy="95" r="15" fill="#1B1F2E"/>
        <circle cx="55" cy="95" r="6" fill="#FFFFFF"/>
        
        <circle cx="125" cy="95" r="15" fill="#1B1F2E"/>
        <circle cx="125" cy="95" r="6" fill="#FFFFFF"/>
    </g>
</svg>
